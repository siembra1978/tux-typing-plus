id: lol.siembra.tuxtypeplus
runtime: org.freedesktop.Platform
runtime-version: "25.08"
base: org.godotengine.godot.BaseApp
base-version: "4.6"
sdk: org.freedesktop.Sdk
command: godot-runner

finish-args:
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11
  - --socket=pulseaudio
  - --device=dri

modules:
  - name: tuxtypeplus
    buildsystem: simple
    build-commands:
      - install -Dm644 tuxtypeplus-*.pck ${FLATPAK_DEST}/bin/godot-runner.pck
      - install -Dm644 linux/${FLATPAK_ID}.desktop -t ${FLATPAK_DEST}/share/applications/
      - install -Dm644 linux/${FLATPAK_ID}.metainfo.xml -t ${FLATPAK_DEST}/share/metainfo/
      - install -Dm644 linux/${FLATPAK_ID}.png -t ${FLATPAK_DEST}/share/icons/hicolor/256x256/apps/
    sources:
      - type: git
        url: https://github.com/siembra1978/tux-typing-plus.git
        commit: 3a75f8ceadd8574faaa37c0cef3a11f645b3fd40

      - type: file
        url: https://github.com/siembra1978/tux-typing-plus/releases/download/v1.0.3/tuxtypeplus-1.0.3-2.pck
        sha256: ab0c117d01417fca3f779cdb237c77a6149d3258fa902c415c54c2bb55d638b1
