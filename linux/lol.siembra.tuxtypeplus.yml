id: lol.siembra.tuxtypeplus
runtime: org.gnome.Platform
runtime-version: "49"
base: org.godotengine.godot.BaseApp
base-version: "4.6"
sdk: org.gnome.Sdk
command: godot-runner

finish-args:
  - --share=ipc
  - --socket=x11
  - --socket=pulseaudio
  - --device=all

modules:
  - name: tuxtypeplus
    buildsystem: simple

    sources:
      - type: git
        url: https://github.com/siembra1978/tux-typing-plus.git
        commit: 98002bcaadefc249716cf7b1d1b40c14587c96b3

      - type: file
        url: https://github.com/siembra1978/tux-typing-plus/releases/download/v1.0.3/tuxtypeplus-1.0.3-2.pck
        sha256: ab0c117d01417fca3f779cdb237c77a6149d3258fa902c415c54c2bb55d638b1

    build-commands:
      - install -Dm644 tuxtypeplus-1.0.3.pck ${FLATPAK_DEST}/bin/godot-runner.pck
      - install -Dm644 linux/${FLATPAK_ID}.desktop ${FLATPAK_DEST}/share/applications/${FLATPAK_ID}.desktop
      - install -Dm644 linux/${FLATPAK_ID}.metainfo.xml ${FLATPAK_DEST}/share/metainfo/${FLATPAK_ID}.metainfo.xml
      - install -Dm644 linux/${FLATPAK_ID}.png ${FLATPAK_DEST}/share/icons/hicolor/256x256/apps/${FLATPAK_ID}.png
