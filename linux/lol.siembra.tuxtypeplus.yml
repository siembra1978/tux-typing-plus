id: lol.siembra.tuxtypeplus
runtime: org.freedesktop.Platform
runtime-version: "24.08"
base: org.godotengine.godot.BaseApp
base-version: "4.6"
sdk: org.freedesktop.Sdk
command: godot-runner

finish-args:
  - --share=ipc
  - --socket=x11
  - --socket=pulseaudio
  - --device=all

modules:
  - name: tuxtypeplus
    buildsystem: simple

    sources:
      - type: git
        url: https://github.com/siembra1978/tux-typing-plus.git
        commit: f7dd120

      - type: file
        url: https://github.com/siembra1978/tux-typing-plus/releases/download/v1.0.1/tuxtypeplus-1.0.1.pck
        sha256: a50f7ae9062942bb1449f801ed7cef1fee0ea109bd631e0a7a295dce6128d903

    build-commands:
      - install -Dm644 tuxtypeplus-1.0.1.pck ${FLATPAK_DEST}/bin/godot-runner.pck
      - install -Dm644 linux/${FLATPAK_ID}.desktop ${FLATPAK_DEST}/share/applications/${FLATPAK_ID}.desktop
      - install -Dm644 linux/${FLATPAK_ID}.metainfo.xml ${FLATPAK_DEST}/share/metainfo/${FLATPAK_ID}.metainfo.xml
      - install -Dm644 media/image/icon/icon256.png ${FLATPAK_DEST}/share/icons/hicolor/256x256/apps/${FLATPAK_ID}.png
